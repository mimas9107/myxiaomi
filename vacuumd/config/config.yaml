devices:
  - id: "robot_s5"
    name: "Living Room Vacuum"
    ip: "192.168.1.9"
    token_env: "VACUUM_ROBOT_S5_TOKEN"
    # zone_mapping: key 為 zone ID (整數), value 為易讀名稱
    # 注意: S5 韌體可能不支援自動讀取 zone ID，需透過觀察或實驗取得
    room_mapping:
      8: "全屋"
      16: "主臥室"
      17: "客廳1"
      18: "次臥室"
      19: "客廳2"
      20: "書房"
      21: "廚房"

server:
  host: "0.0.0.0"
  port: 8000
  cache_ttl: 5
  retry_count: 3
  # 使用者時區 (IANA 格式)。cron 排程時間依此時區解讀，內部邏輯統一 UTC。
  timezone: "Asia/Taipei"
  # 備援守門：每小時 31 分檢查一次是否仍在清掃，若確認中則下達回充
  fallback_guard_enabled: true
  fallback_guard_cron: "31 * * * *"
  # 需大於 cache_ttl，確保第二次狀態確認不是同一筆快取
  fallback_guard_confirm_seconds: 6
  # 只攔截「剛啟動不久」的清掃，避免誤停本地長任務（例如 :00 啟動超過 30 分）
  fallback_guard_recent_cleaning_minutes: 10

schedules:
- task_id: daily_1300
  device_id: robot_s5
  cron: 0 13 * * *
  est_duration: 40
  enabled: true
  zones: []
- task_id: kitchen_evening
  device_id: robot_s5
  cron: 0 21 * * *
  est_duration: 15
  enabled: false
  zones:
  - 21
- task_id: bedroom_morning
  device_id: robot_s5
  cron: 30 8 * * 1-5
  est_duration: 20
  enabled: false
  zones:
  - 16
  - 18
- task_id: test_ui_persists
  device_id: robot_s5
  cron: 45 10 * * *
  est_duration: 30
  enabled: true
  zones:
  - 17
  - 19
- task_id: test3
  device_id: robot_s5
  cron: 30 17 * * *
  est_duration: 40
  enabled: true
  zones:
  - 20
- task_id: test4
  device_id: robot_s5
  cron: 30 18 * * *
  est_duration: 40
  enabled: true
  zones:
  - 19
- task_id: test5
  device_id: robot_s5
  cron: 30 19 * * *
